    </linearGradient>
    <clipPath id="clip"><path d="M 14.00 16.00 Q 32.00 11.50 50.00 16.00 L 50.00 29.50 C 50.00 41.33 40.10 48.42 32.00 51.00 C 23.90 48.42 14.00 41.33 14.00 29.50 Z"/></clipPath>
