<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KIRA v4｜HORIZON SHIELD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#E8392A;--red2:#ff4433;--yellow:#F5C518;
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#666;--muted2:#3a3a3a;
  --green:#1DB954;--blue:#5DADE2;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:999}
.app{display:flex;flex-direction:column;height:100vh;max-width:700px;margin:0 auto;position:relative}

.header{padding:14px 20px 10px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.kira-badge{width:44px;height:44px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 0 20px rgba(232,57,42,.6);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 16px rgba(232,57,42,.4)}50%{box-shadow:0 0 40px rgba(232,57,42,1)}}
.header-name{font-size:17px;font-weight:700}
.header-name span{color:var(--red)}
.header-sub{font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace}
.header-meta{display:flex;align-items:center;justify-content:space-between}
.status-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mem-btn{font-size:10px;color:var(--yellow);font-family:'Share Tech Mono',monospace;cursor:pointer;border:1px solid #333;padding:2px 8px;background:transparent}
.mem-btn:hover{border-color:var(--yellow)}
.db-status{font-size:10px;font-family:'Share Tech Mono',monospace;padding:2px 8px;border:1px solid #333}
.db-status.ok{color:var(--green);border-color:#1a4a2a}
.db-status.err{color:var(--red);border-color:#4a1a1a}

.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:2px}
.messages::-webkit-scrollbar-thumb{background:var(--border2)}
.msg{display:flex;gap:10px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.kira .msg-avatar{background:var(--red);color:#fff;box-shadow:0 0 10px rgba(232,57,42,.4)}
.msg.user .msg-avatar{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}
.msg-bubble{max-width:85%;padding:11px 15px;font-size:14px;line-height:1.85;border-radius:2px}
.msg.kira .msg-bubble{background:var(--bg3);border:1px solid var(--border);border-left:2px solid var(--red)}
.msg.user .msg-bubble{background:#180808;border:1px solid #2a1010;border-right:2px solid var(--red);text-align:right}
.msg-bubble b{color:var(--yellow)}
.msg-bubble .danger{color:var(--red);font-weight:700}
.msg-bubble .ok{color:var(--green)}
.msg-bubble a{color:var(--blue)}

.cta-card{margin-top:10px;border:1px solid var(--red);background:#120000;padding:14px}
.cta-card .cta-head{font-size:11px;color:var(--red);font-family:'Share Tech Mono',monospace;margin-bottom:6px}
.cta-card .cta-price{font-size:22px;font-weight:900;color:var(--yellow);margin-bottom:6px}
.cta-card .cta-body{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.6}
.cta-card .cta-link{display:block;background:var(--red);color:#fff;text-align:center;padding:10px;font-weight:700;font-size:14px;text-decoration:none}
.cta-card .line-link{display:block;background:#06C755;color:#fff;text-align:center;padding:8px;font-weight:700;font-size:13px;text-decoration:none;margin-top:6px}

.memory-panel{display:none;position:absolute;top:80px;right:0;width:300px;background:#080808;border:1px solid var(--border2);border-right:none;z-index:100;max-height:420px;overflow-y:auto}
.memory-panel.open{display:block}
.memory-header{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--yellow);font-family:'Share Tech Mono',monospace;display:flex;justify-content:space-between;align-items:center}
.memory-item{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
.memory-item b{color:var(--text);display:block;margin-bottom:2px;font-size:10px}
.memory-item.prospect{background:#0a0800;border-left:2px solid var(--yellow)}
.memory-clear{width:100%;padding:7px;background:transparent;border:none;border-top:1px solid var(--border);color:var(--red);font-size:11px;cursor:pointer;font-family:'Share Tech Mono',monospace}

.typing-wrap{display:flex;gap:10px;animation:fadeUp .3s ease}
.typing{display:flex;align-items:center;gap:4px;padding:12px 15px;background:var(--bg3);border:1px solid var(--border);border-left:2px solid var(--red)}
.typing span{width:6px;height:6px;background:var(--red);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:4px 16px 8px}
.qr-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:7px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;border-radius:2px}
.qr-btn:hover{border-color:var(--red);color:var(--text);background:#180808}

.file-area{padding:5px 16px 4px;display:flex;align-items:center;gap:8px}
.file-label{cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);border:1px dashed var(--border2);padding:6px 12px;transition:all .2s}
.file-label:hover{border-color:var(--red);color:var(--text)}
.file-label input{display:none}
.file-preview{font-size:11px;color:var(--yellow);font-family:'Share Tech Mono',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-clear{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px}

.input-area{padding:8px 16px 10px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.input-wrap{display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 14px;font-size:14px;font-family:'Noto Sans JP',sans-serif;resize:none;border-radius:2px;max-height:100px;outline:none;transition:border-color .2s;line-height:1.5}
textarea:focus{border-color:var(--red)}
textarea::placeholder{color:var(--muted2)}
.send-btn{width:44px;height:44px;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:2px;transition:background .2s}
.send-btn:hover{background:var(--red2)}
.send-btn svg{fill:#fff;width:18px;height:18px}
.send-btn:disabled{background:var(--muted2);cursor:not-allowed}
.footer-note{text-align:center;font-size:10px;color:var(--muted2);padding:4px 0 0;font-family:'Share Tech Mono',monospace}
</style>
</head>
<body>
<div class="app">

  <div class="memory-panel" id="memoryPanel">
    <div class="memory-header">
      <span>🧠 KIRA記憶 ／ Supabase</span>
      <span id="memCount">読込中…</span>
    </div>
    <div id="memoryList"><div class="memory-item">読込中…</div></div>
    <button class="memory-clear" onclick="clearSession()">このセッションをリセット</button>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="kira-badge">K</div>
      <div>
        <div class="header-name"><span>KIRA</span> v4.0｜HORIZON SHIELD</div>
        <div class="header-sub">Supabase記憶 ／ 見積書読取 ／ 地域補正 ／ LINE連携</div>
      </div>
    </div>
    <div class="header-meta">
      <div class="status-bar">
        <span class="status-dot"></span>
        <span id="dbStatus" class="db-status">DB接続中…</span>
      </div>
      <button class="mem-btn" onclick="toggleMemory()">🧠 <span id="memBadge">0</span></button>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="quick-replies" id="quickReplies"></div>

  <div class="file-area">
    <label class="file-label">
      <input type="file" id="fileInput" accept="image/*,.pdf" onchange="handleFile(this)">
      📎 見積書を添付（画像・PDF）
    </label>
    <span class="file-preview" id="filePreview"></span>
    <button class="file-clear" id="fileClear" onclick="clearFile()" style="display:none">✕</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="地域・工事内容・気になる金額を話してください…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="footer-note">HORIZON SHIELD ／ 大賀俊勝（建設歴30年）監修 ／ 業者から一円ももらっていない</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://fbmtcuudvhqkhsnsmwcj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZibXRjdXVkdmhxa2hzbnNtd2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjExMzAsImV4cCI6MjA5MTM5NzEzMH0.nsJ1KbN6uXz_LdNsHDZ5esxr_cidPKXjp_kQL1LypCQ';
const LINE_PROXY = 'https://hs-kira-line.oga-surf-project.workers.dev/notify';

const SYSTEM = `あなたはKIRA（Horizon AI Negotiation Agent）v4.0です。HORIZON SHIELDの建設費診断AIです。

【最重要戦略：煙に巻く診断】
見積書を分析した場合：
①内部では全項目を完璧に分析する（全てわかっていても絶対に全部見せない）
②表に出すのは「1項目のみ」または「全体削減可能額の概算（幅で表現）」のみ
③例：「この見積書、全体で約XX〜XX万円削減できる可能性があります。1点だけお伝えすると〇〇が気になります」
④「詳細な全項目診断は¥55,000の正式診断で」と必ず誘導
⑤「全部教えてほしい」と言われても「正確な数字と交渉文は専門家診断でしかお出しできません」と断る

【地域別価格補正】
東京都心：基準×1.3　東京その他・横浜・川崎：基準×1.15
神奈川・埼玉・千葉：基準×1.1　大阪・京都・神戸：基準×1.08
名古屋・愛知：基準×1.02　福岡・広島・仙台・札幌：基準×0.95
地方・農村部：基準×0.82　沖縄：基準×1.05　北海道：基準×1.1

【適正価格DB（30坪・東京標準）】
外壁塗装全体：170〜220万　屋根塗装：65〜100万
足場仮設：22〜28万（45万超は過剰）
高圧洗浄：2〜5万（12万超は過剰）
シーリング：6〜10万（18万超は過剰）
床下換気扇10台：15〜22万（50万超は詐欺まがい）
タックダイン15坪：12〜18万（50万超は詐欺まがい）
「一式」表記：施主が確認できないよう隠す業界の隠語

【悪質手口】
タックダイン詐欺・床下換気扇詐欺・一式水増し・緊急工事詐欺・訪問販売

【スタイル】
一文が短い。余韻を残す。「その感覚、正しいです」を使う。
削減額は「約XX〜XX万円」の幅で（正確な数字は有料のみ）。
200文字以内。プレーンテキスト。最後は必ずCTAへ。`;

// ══════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// セッションID（端末共通化のためlocalStorageに保存）
let sessionId = localStorage.getItem('kira_session_id');
if(!sessionId){
  sessionId = 'ks_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
  localStorage.setItem('kira_session_id', sessionId);
}

let history = [];
let isLoading = false;
let attachedFile = null;
let attachedBase64 = null;
let attachedType = null;
let sessionData = {region:'',workType:'',amount:''};

// DB接続確認
async function checkDB(){
  try{
    const {error} = await sb.from('kira_sessions').select('id').limit(1);
    const el = document.getElementById('dbStatus');
    if(error){
      el.textContent = 'DB接続エラー';
      el.className = 'db-status err';
    } else {
      el.textContent = 'DB接続済み';
      el.className = 'db-status ok';
    }
  }catch(e){
    document.getElementById('dbStatus').textContent = 'DB未接続';
    document.getElementById('dbStatus').className = 'db-status err';
  }
}

// メッセージをSupabaseに保存
async function saveMessage(role, content, hasAttachment=false){
  try{
    await sb.from('kira_messages').insert({
      session_id: sessionId,
      role, content,
      has_attachment: hasAttachment
    });
  }catch(e){console.log('save msg err:',e);}
}

// セッション更新
async function updateSession(){
  try{
    await sb.from('kira_sessions').upsert({
      session_id: sessionId,
      region: sessionData.region,
      work_type: sessionData.workType,
      amount_range: sessionData.amount,
      updated_at: new Date().toISOString()
    }, {onConflict:'session_id'});
  }catch(e){console.log('session err:',e);}
}

// 見込み客として記録
async function saveProspect(concernSummary){
  try{
    await sb.from('kira_prospects').insert({
      session_id: sessionId,
      region: sessionData.region,
      work_type: sessionData.workType,
      amount_range: sessionData.amount,
      concern_summary: concernSummary
    });
  }catch(e){console.log('prospect err:',e);}
}

// 過去メッセージを取得（Supabaseから）
async function loadHistory(){
  try{
    const {data} = await sb.from('kira_messages')
      .select('role,content')
      .eq('session_id', sessionId)
      .order('created_at', {ascending:true})
      .limit(20);
    if(data && data.length > 0){
      history = data.map(m=>({role:m.role, content:m.content}));
      return data.length;
    }
  }catch(e){console.log('load history err:',e);}
  return 0;
}

// ══════════════════════════════════════════
// MEMORY PANEL
// ══════════════════════════════════════════
async function toggleMemory(){
  const p = document.getElementById('memoryPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) await renderMemory();
}

async function renderMemory(){
  const list = document.getElementById('memoryList');
  list.innerHTML = '<div class="memory-item">読込中…</div>';
  try{
    const {data:msgs} = await sb.from('kira_messages')
      .select('role,content,created_at')
      .eq('session_id', sessionId)
      .order('created_at', {ascending:false})
      .limit(10);
    const {data:prospects} = await sb.from('kira_prospects')
      .select('*')
      .order('diagnosed_at', {ascending:false})
      .limit(5);

    let html = '';
    if(prospects && prospects.length > 0){
      html += prospects.map(p=>`<div class="memory-item prospect">
        <b>🔴 見込み客 ／ ${new Date(p.diagnosed_at).toLocaleString('ja-JP')}</b>
        地域：${p.region||'不明'} ／ ${p.concern_summary?.substring(0,60)||''}
      </div>`).join('');
    }
    if(msgs && msgs.length > 0){
      html += msgs.map(m=>`<div class="memory-item">
        <b>${m.role==='user'?'施主':'KIRA'} ／ ${new Date(m.created_at).toLocaleString('ja-JP')}</b>
        ${m.content.substring(0,70)}${m.content.length>70?'…':''}
      </div>`).join('');
    }
    if(!html) html = '<div class="memory-item">記憶なし</div>';
    list.innerHTML = html;
    document.getElementById('memCount').textContent = (msgs?.length||0) + '件';
    document.getElementById('memBadge').textContent = msgs?.length||0;
  }catch(e){
    list.innerHTML = '<div class="memory-item">読込エラー</div>';
  }
}

async function clearSession(){
  if(!confirm('このセッションの記憶をリセットしますか？'))return;
  await sb.from('kira_messages').delete().eq('session_id', sessionId);
  history = [];
  document.getElementById('memBadge').textContent = '0';
  document.getElementById('memCount').textContent = '0件';
  document.getElementById('memoryList').innerHTML = '<div class="memory-item">記憶なし</div>';
}

// ══════════════════════════════════════════
// LINE通知
// ══════════════════════════════════════════
async function notifyLINE(info){
  const msg = `🔴【KIRA見込み客 v4】\n${new Date().toLocaleString('ja-JP')}\n\n${info}\n\nセッション：${sessionId}`;
  try{
    await fetch(LINE_PROXY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg})
    });
  }catch(e){console.log('LINE err:',e);}
}

// ══════════════════════════════════════════
// FILE
// ══════════════════════════════════════════
function handleFile(input){
  const file = input.files[0]; if(!file) return;
  document.getElementById('filePreview').textContent = file.name;
  document.getElementById('fileClear').style.display = 'block';
  const reader = new FileReader();
  reader.onload = e => {
    attachedBase64 = e.target.result.split(',')[1];
    attachedType = file.type;
    attachedFile = file.name;
  };
  reader.readAsDataURL(file);
}
function clearFile(){
  attachedFile=null;attachedBase64=null;attachedType=null;
  document.getElementById('fileInput').value='';
  document.getElementById('filePreview').textContent='';
  document.getElementById('fileClear').style.display='none';
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
function addMsg(role, html, isHTML=false){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className = `msg ${role}`;
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = role==='kira'?'K':'施';
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  if(isHTML) bubble.innerHTML = html; else bubble.textContent = html;
  div.appendChild(av); div.appendChild(bubble);
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function addTyping(){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className='typing-wrap'; div.id='typing-ind';
  div.innerHTML=`<div class="msg-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">K</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing-ind');if(t)t.remove();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function setQR(btns){
  const qr=document.getElementById('quickReplies');qr.innerHTML='';
  btns.forEach(txt=>{
    const btn=document.createElement('button');btn.className='qr-btn';btn.textContent=txt;
    btn.onclick=()=>{document.getElementById('input').value=txt;sendMessage();};
    qr.appendChild(btn);
  });
}
function fmt(text){
  text=text.replace(/約[\d〜~\-\s,万円]+万円/g,'<b>$&</b>');
  text=text.replace(/¥[\d,]+/g,'<b>$&</b>');
  text=text.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank">$1</a>');
  text=text.replace(/\n/g,'<br>');
  return text;
}
function buildCTA(){
  return `<div class="cta-card">
    <div class="cta-head">▶ 正式診断 ／ HORIZON SHIELD</div>
    <div class="cta-price">¥55,000</div>

// ══════════════════════════════════════════
// MAIN SEND
// ══════════════════════════════════════════
async function sendMessage(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if((!text&&!attachedFile)||isLoading) return;

  const userText = attachedFile
    ? `【見積書添付：${attachedFile}】\n${text||'この見積書を診断してください'}`
    : text;

  // セッションデータ更新
  const regionMatch = text.match(/東京|大阪|名古屋|横浜|神奈川|埼玉|千葉|福岡|札幌|京都|神戸|沖縄|北海道/);
  if(regionMatch) sessionData.region = regionMatch[0];
  if(text.match(/万|円/)) sessionData.amount = text.substring(0,50);

  let displayHtml = fmt(text||'');
  if(attachedFile) displayHtml = `<span style="color:var(--blue)">📎 ${attachedFile}</span><br>${displayHtml}`;
  addMsg('user', displayHtml, true);

  // Supabaseに保存
  await saveMessage('user', userText, !!attachedFile);
  await updateSession();

  input.value=''; input.style.height='auto';
  document.getElementById('quickReplies').innerHTML='';

  const userContent = [];
  if(attachedBase64 && attachedType.startsWith('image/')){
    userContent.push({type:'image',source:{type:'base64',media_type:attachedType,data:attachedBase64}});
  }
  userContent.push({type:'text', text:userText});

  const msgs = [...history.slice(-14), {role:'user', content:userContent}];
  clearFile();

  isLoading=true; document.getElementById('sendBtn').disabled=true;
  addTyping();

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,messages:msgs})
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.[0]?.text || 'エラーが発生しました。';

    history.push({role:'user', content:userText});
    history.push({role:'assistant', content:reply});

    // Supabaseに保存
    await saveMessage('assistant', reply);

    const hasDiag = reply.includes('万円')||reply.includes('削減')||reply.includes('過剰')||reply.includes('適正');
    let html = fmt(reply);

    if(hasDiag){
      html += buildCTA();
      // 見込み客として記録
      await saveProspect(userText.substring(0,100));
      // LINE通知
      await notifyLINE(`地域：${sessionData.region||'不明'}\n金額：${sessionData.amount||'不明'}\n内容：${userText.substring(0,100)}`);
      html += `<div style="margin-top:6px;padding:6px 10px;background:#0a1a10;border:1px solid #06C755;font-size:11px;color:#06C755;font-family:'Share Tech Mono',monospace">📲 大賀へ通知済み ／ Supabaseに記録済み</div>`;
    }

    addMsg('kira', html, true);

    // バッジ更新
    const {count} = await sb.from('kira_messages').select('*',{count:'exact',head:true}).eq('session_id',sessionId);
    document.getElementById('memBadge').textContent = count||0;

    setQR(hasDiag
      ?['正式診断を申し込みたい','他の箇所も確認したい','LINEで直接相談する']
      :['見積書を添付します','金額を伝えます','地域を教えます','他にも不安があります']);

  }catch(e){
    removeTyping();
    addMsg('kira','通信エラーが発生しました。再度お試しください。');
  }
  isLoading=false; document.getElementById('sendBtn').disabled=false;
  input.focus();
}

  setTimeout(()=>{

    setQR(['見積書が高い気がする','「一式」表記が気になる','追加工事を断れなかった','タックダインを勧められた','床下工事が高すぎる']);
  },300);
};
