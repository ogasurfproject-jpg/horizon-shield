name: note自動投稿
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  post-to-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Google Chromeインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Playwrightインストール
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: npm install playwright-core
      - name: note投稿実行
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node note-post/post_to_note.js
