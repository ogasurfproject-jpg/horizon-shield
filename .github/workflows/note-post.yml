name: note自動投稿
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  post-to-note:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Google Chromeインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: 依存インストール
        run: cd note-post && PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install --no-package-lock install
      - name: note投稿実行
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_SESSION: ${{ secrets.NOTE_SESSION }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        run: cd note-post && node post_to_note.js
      - name: 投稿済みリストをコミット
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add note-post/posted_titles.json || true
          git diff --staged --quiet || git commit -m "chore: update posted_titles"
          git push || true
