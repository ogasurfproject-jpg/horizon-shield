name: Auto Blog Post

on:
  repository_dispatch:
    types: [blog-post]
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate_blog.py

      - name: Commit and push
        run: |
          git config user.name "KIRA Bot"
          git config user.email "kira@the-horizons-innovation.com"
          git add blog/
          git diff --staged --quiet || git commit -m "blog post $(date +%Y-%m-%d)"
          git push
