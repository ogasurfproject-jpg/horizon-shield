name: Auto Blog Post

on:
  repository_dispatch:
    types: [blog-post]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate_blog.py

      - name: Commit and push
        run: |
          git config user.name "KIRA Bot"
          git config user.email "kira@the-horizons-innovation.com"
          git add blog/
          git diff --staged --quiet || git commit -m "blog post $(date +%Y-%m-%d)"
          git push

      # --- HS-DEPLOY-DISPATCH v1 (2026-07-06): GITHUB_TOKEN push does not fire on:push workflows,
      # so explicitly dispatch the Pages deploy when a new article was committed today.
      - name: Trigger Pages deploy
        run: |
          if git log -1 --pretty=%s | grep -q "blog post $(date +%Y-%m-%d)"; then
            curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }}/actions/workflows/static.yml/dispatches -d '{"ref":"main"}'
            echo "DEPLOY DISPATCHED"
          else
            echo "SKIP: no new article commit today"
          fi

      - name: Post to Hatena Blog
        if: ${{ false }}  # HS-HATENA-PAUSE (2026-07-06): content redesign per Hatena operations warning
        env:
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
        run: python3 post_hatena.py
