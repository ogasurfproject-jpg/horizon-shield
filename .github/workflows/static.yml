# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the published site into _public, EXCLUDING non-public files.
      # The repository itself and its git history are left untouched (we copy, then prune the copy).
      # These files are server-side only (workers/tooling/generators) and are never loaded by a browser;
      # the live pages call the deployed Cloudflare Workers, not these repo paths. Nothing on the site changes.
      - name: Build published site (exclude non-public source)
        run: |
          mkdir -p _public
          rsync -a --exclude='.git' --exclude='_public' ./ _public/
          # server-side code, tooling, CI, internal engine sources, docs
          rm -rf _public/tools _public/workers _public/.github
          rm -f  _public/kira.js _public/kira-v4.js
          # all Python (generators, patch scripts, tests) and internal markdown docs
          find _public -type f -name '*.py' -delete
          find _public -type f -name '*.md' -delete
          echo "----- published top-level after prune -----"
          ls -1 _public

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish only the pruned copy, not the whole repository
          path: '_public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
