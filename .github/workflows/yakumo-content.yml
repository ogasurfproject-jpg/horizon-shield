name: yakumo-content-autopublish

# 八雲 加盟店ヒアリング -> GEO/AEO/LLMO/WebMCP 自動生成 -> fail-closed検証 -> 公開 -> IndexNow
# トリガー:
#   - repository_dispatch (event_type: yakumo-hearing-completed)  = hs-hearing Worker が回答受信時に叩く
#   - workflow_dispatch                                           = 手動テスト(profile_json を渡す)
#
# 安全設計: validate.py が1枚でも落とせば job が失敗し、commit は一切行われない(fail-closed)。
# IndexNow 送信は indexnow_submit.py の3関所(200/マーカー/MOAT)を通ったURLだけ。落ちれば送らない。

on:
  repository_dispatch:
    types: [yakumo-hearing-completed]
  workflow_dispatch:
    inputs:
      profile_json:
        # TOshi恒久ルール: ヒアリング前の生成は絶対にしない。デフォルト値は置かない(空押しで何も生成させない)。
        # 手動実行する時は /admin/export/<store_id> で取れる「回答済みプロフィール」を貼ること。
        description: "回答済みの正規化プロフィールJSON(1行)。/admin/export/<store_id> の中身。ヒアリング完了店のみ"
        required: true

permissions:
  contents: write

concurrency:
  group: yakumo-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.commit.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # 重要: GITHUB_TOKENのpushは他のワークフローを起動しない(GitHub仕様)。
          # PAT(YAKUMO_PUSH_TOKEN)でpushすることで、公開コミットが Pages デプロイ(static.yml)を自動起動する。
          # secret未設定時は従来動作(その場合は手動でPagesを回す)。
          token: ${{ secrets.YAKUMO_PUSH_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract dispatch payload (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const cp = context.payload.client_payload || {};
            if (!cp.profile) { core.setFailed('client_payload.profile がありません'); return; }
            fs.writeFileSync('/tmp/dispatch.json', JSON.stringify({ client_payload: cp }));
            core.info('dispatch written for ' + (cp.profile.company || '(no company)') + ' focus=' + ((cp.autopilot||{}).focus_primary || 'none'));

      - name: Extract dispatch payload (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = ${{ toJSON(inputs.profile_json) }};
            let p;
            try { p = JSON.parse(raw); } catch (e) { core.setFailed('profile_json が不正なJSON: ' + e.message); return; }
            fs.writeFileSync('/tmp/dispatch.json', JSON.stringify({ client_payload: { profile: p, autopilot: p.autopilot || {} } }));
            core.info('manual dispatch written');

      - name: Generate pages (GEO/AEO/LLMO/WebMCP + focus, dedup gate A)
        run: python3 tools/yakumo/generate.py --dispatch /tmp/dispatch.json

      - name: Validate pages (fail-closed gate)
        run: python3 tools/yakumo/validate.py --manifest tools/yakumo/last_manifest.json

      - name: Commit and push (only if validation passed)
        id: commit
        run: |
          if [ -z "$(git status --porcelain yakumo/ tools/yakumo/last_manifest.json sitemap.xml data/yakumo-content-manifest.json)" ]; then
            echo "変更なし。公開スキップ。"
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "yakumo-bot"
          git config user.email "yakumo-bot@users.noreply.github.com"
          git add yakumo/ tools/yakumo/last_manifest.json sitemap.xml data/yakumo-content-manifest.json
          COUNT=$(python3 -c "import json;print(json.load(open('tools/yakumo/last_manifest.json'))['count'])")
          git commit -m "yakumo: auto-publish ${COUNT} verified-partner pages (GEO/AEO/LLMO/WebMCP)"
          for i in 1 2 3 4; do
            if git push origin main; then break; fi
            echo "push retry $i"; sleep $((2**i))
          done
          echo "published=true" >> "$GITHUB_OUTPUT"

  indexnow:
    needs: generate
    if: needs.generate.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for GitHub Pages deploy
        run: sleep 150

      - name: Submit to IndexNow (3-gate self-check inside; only live URLs go)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "INDEXNOW_KEY 未設定。送信スキップ(fail-safe)。Secrets に追加すれば次回から自動送信。"
            exit 0
          fi
          URLS=$(python3 -c "import json;print(','.join(json.load(open('tools/yakumo/last_manifest.json'))['urls']))")
          echo "submit: $URLS"
          # /yakumo/ 配下は souba還流マーカー必須を外す(--no-marker)。3関所(200/MOAT)は内部で実施。
          python3 indexnow_submit.py --urls "$URLS" --no-marker --send

      # AUTOPILOT: 公開を活動フィードに記録 + 指紋台帳をワーカーKVに同期(fail-open: 未設定でも失敗させない)
      - name: Activity callback + dedup ledger sync (optional)
        env:
          HEARING_ADMIN_SECRET: ${{ secrets.HEARING_ADMIN_SECRET }}
        run: |
          if [ -z "$HEARING_ADMIN_SECRET" ]; then echo "HEARING_ADMIN_SECRET 未設定。コールバック省略(fail-open)。"; exit 0; fi
          W="https://hs-hearing.oga-surf-project.workers.dev"
          COUNT=$(python3 -c "import json;print(json.load(open('tools/yakumo/last_manifest.json'))['count'])")
          MEMBER=$(python3 -c "import json;print(json.load(open('tools/yakumo/last_manifest.json')).get('member_no') or '')")
          curl -s -X POST "$W/admin/activity" -H "X-Admin-Key: $HEARING_ADMIN_SECRET" -H "Content-Type: application/json" \
            -d "{\"type\":\"published\",\"member_no\":\"$MEMBER\",\"text\":\"加盟店の紹介ページを${COUNT}枚 検証通過のうえ公開しました\"}" || true
          python3 - <<'PY' || true
          import json,urllib.request,os
          man=json.load(open('tools/yakumo/last_manifest.json'))
          items=man.get('new_fingerprints') or []
          if items:
              req=urllib.request.Request('https://hs-hearing.oga-surf-project.workers.dev/admin/dedup-register',
                  data=json.dumps({'items':items}).encode(),
                  headers={'X-Admin-Key':os.environ['HEARING_ADMIN_SECRET'],'Content-Type':'application/json'})
              print(urllib.request.urlopen(req,timeout=20).read()[:200])
          PY
