<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/admin-app/manifest.json">
<meta name="theme-color" content="#0f172a">
<title>HS管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--text:#f1f5f9;--sub:#94a3b8;--border:#334155;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.header{background:var(--surface);padding:env(safe-area-inset-top,16px) 16px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;position:sticky;top:0;z-index:20}
.header-left .title{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.header-left .sub{font-size:12px;color:var(--sub);margin-top:2px}
.badge{background:var(--red);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;min-width:24px;text-align:center}
.install-bar{display:none;background:var(--blue);padding:12px 16px;cursor:pointer;text-align:center;font-size:14px;font-weight:600;color:#fff}
.nav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:1px solid var(--border)}
.nav-item{padding:10px 4px 8px;text-align:center;cursor:pointer;font-size:11px;color:var(--sub);border-bottom:2px solid transparent;transition:all .15s}
.nav-item.active{color:var(--text);border-bottom-color:var(--blue);font-weight:500}
.nav-icon{font-size:20px;margin-bottom:2px}
.main{flex:1;padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.card-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.card-name{font-size:15px;font-weight:500}.card-email{font-size:12px;color:var(--sub);margin-top:3px}
.card-bd{padding:12px 16px;font-size:13px;color:var(--sub);line-height:1.6}
.card-ft{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-date{font-size:11px;color:var(--sub)}
.del-btn{font-size:12px;color:var(--red);padding:6px 14px;border:1px solid var(--red);border-radius:8px;background:none;cursor:pointer;font-family:inherit}
.del-btn:active{background:#450a0a}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:16px}
.stat-label{font-size:12px;color:var(--sub);margin-bottom:6px}.stat-val{font-size:30px;font-weight:600}.stat-hint{font-size:11px;color:var(--sub);margin-top:4px}
.svc-list{padding:0 16px}
.svc-item{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);gap:10px}
.svc-item:last-child{border:none}.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green)}.dot-a{background:var(--amber)}.dot-r{background:var(--red)}
.svc-name{flex:1;font-size:13px}.svc-tag{font-size:11px;color:var(--sub)}
.btn-primary{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px}
.btn-primary:active{background:#2563eb}
.btn-sec{width:100%;padding:12px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:12px}
.score-bar-bg{background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;margin-top:8px}
.score-bar{height:5px;border-radius:4px;transition:width .4s}
.empty{text-align:center;padding:48px 16px;color:var(--sub);font-size:14px}
.loading{text-align:center;padding:40px;color:var(--sub);font-size:14px}
.err-box{background:#450a0a;color:#fca5a5;border-radius:10px;padding:14px;font-size:13px;line-height:1.6;margin-bottom:12px}
.ok-box{background:#052e16;color:#86efac;border-radius:10px;padding:14px;font-size:13px;margin-bottom:12px}
.info-box{background:var(--surface);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--sub);line-height:1.8;margin-bottom:12px;border:1px solid var(--border)}
.step{display:flex;gap:12px;margin-bottom:10px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-text{font-size:13px;color:var(--sub);line-height:1.6;padding-top:2px}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="title">HORIZON SHIELD</div>
    <div class="sub" id="conn-status">管理ダッシュボード</div>
  </div>
  <div id="badge-wrap"></div>
</div>
<div class="install-bar" id="install-bar" onclick="installApp()">📲 アプリとしてインストール</div>
<nav class="nav">
  <div class="nav-item active" onclick="go('inquiries',this)"><div class="nav-icon">📋</div>問い合わせ</div>
  <div class="nav-item" onclick="go('dashboard',this)"><div class="nav-icon">📊</div>状況</div>
  <div class="nav-item" onclick="go('prospects',this)"><div class="nav-icon">🎯</div>見込み</div>
  <div class="nav-item" onclick="go('settings',this)"><div class="nav-icon">⚙️</div>設定</div>
</nav>
<main class="main" id="main"></main>
<script>
const WORKER = 'https://hs-kira-proxy.oga-surf-project.workers.dev';
let state = { tab: 'inquiries', inquiries: [], prospects: [], loaded: false };
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-bar').style.display = 'block';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-bar').style.display = 'none';
  deferredPrompt = null;
});

async function installApp() {
  if (!deferredPrompt) {
    alert('インストール準備中です。ページをリロードしてから再度お試しください。');
    return;
  }
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-bar').style.display = 'none';
}

function go(tab, el) {
  state.tab = tab;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}
function render() {
  const m = document.getElementById('main');
  const fns = { inquiries: renderInquiries, dashboard: renderDashboard, prospects: renderProspects, settings: renderSettings };
  m.innerHTML = fns[state.tab]();
}
function renderDashboard() {
  const svcs = [
    { name: 'LP (shield.the-horizons-innovation.com)', tag: '稼働中', d: 'g' },
    { name: 'KIRA AI / Cloudflare Worker v6', tag: '稼働中', d: 'g' },
    { name: 'note自動投稿 v10 (毎朝9時)', tag: '稼働中', d: 'g' },
    { name: 'PayPay決済', tag: '契約済み', d: 'g' },
    { name: 'ゼウス決済', tag: '審査中', d: 'a' },
    { name: 'PAY.JP', tag: '未申請', d: 'r' },
    { name: 'Resend ドメイン認証', tag: '設定中', d: 'a' },
    { name: '持続化補助金 4/30締切', tag: '残14日', d: 'a' },
  ];
  return `<div class="stat-grid"><div class="stat"><div class="stat-label">問い合わせ</div><div class="stat-val">${state.inquiries.length}</div><div class="stat-hint">取得済み</div></div><div class="stat"><div class="stat-label">PayPay</div><div class="stat-val" style="font-size:18px;color:var(--green);padding-top:6px">契約済</div><div class="stat-hint">クレカ審査中</div></div></div><div class="card"><div class="card-hd"><div class="card-name">インフラ状況</div></div><div class="svc-list">${svcs.map(s=>`<div class="svc-item"><div class="dot dot-${s.d}"></div><div class="svc-name">${s.name}</div><div class="svc-tag">${s.tag}</div></div>`).join('')}</div></div>`;
}
function renderInquiries() {
  if (!state.loaded) return `<button class="btn-primary" onclick="fetchInquiries()">📥 問い合わせを読み込む</button><div class="info-box">ボタンを押してWorkerから最新の問い合わせ一覧を取得します。</div>`;
  if (!state.inquiries.length) return `<button class="btn-sec" onclick="fetchInquiries()">再読み込み</button><div class="empty">問い合わせはまだありません</div>`;
  return `<button class="btn-sec" onclick="fetchInquiries()">再読み込み</button>` +
    state.inquiries.map(item => `<div class="card"><div class="card-hd"><div class="card-name">${esc(item.name||'名前なし')}</div><div class="card-email">${esc(item.email||'')}</div></div><div class="card-bd">${esc((item.result||'診断結果なし').slice(0,150))}${(item.result||'').length>150?'…':''}</div><div class="card-ft"><span class="card-date">${esc(item.createdAt||item.date||'')}</span><button class="del-btn" onclick="delItem('${esc(item.key||item.email||'')}')">削除</button></div></div>`).join('');
}
function renderProspects() {
  if (!state.prospects.length) return `<button class="btn-primary" onclick="fetchProspects()">🎯 見込み客を読み込む</button><div class="info-box">hs-monitorが検出した見込み客のスコア一覧です。</div>`;
  return `<button class="btn-sec" onclick="fetchProspects()">再読み込み</button>` +
    state.prospects.map(p => {
      const sc = p.score||0;
      const col = sc>=85?'var(--green)':sc>=75?'var(--amber)':'var(--sub)';
      return `<div class="card" style="padding:14px 16px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="font-size:14px;font-weight:500;flex:1;margin-right:8px">${esc(p.title||p.name||'未タイトル')}</div><div style="font-size:18px;font-weight:600;color:${col}">${sc}</div></div><div style="font-size:12px;color:var(--sub);margin:4px 0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.url||p.source||'')}</div><div class="score-bar-bg"><div class="score-bar" style="width:${Math.min(sc,100)}%;background:${col}"></div></div></div>`;
    }).join('');
}
function renderSettings() {
  return `<div class="card" style="padding:16px;margin-bottom:12px"><div style="font-weight:500;margin-bottom:12px">接続テスト</div><div style="font-size:13px;color:var(--sub);margin-bottom:12px;word-break:break-all">Worker: ${WORKER}</div><button class="btn-primary" onclick="testConn()">接続テスト</button><div id="test-result"></div></div><div class="card" style="padding:16px;margin-bottom:12px"><div style="font-weight:500;margin-bottom:14px">Androidでアプリとして使う</div><div class="step"><div class="step-num">1</div><div class="step-text">画面上部の青いバーが表示されたらタップ</div></div><div class="step"><div class="step-num">2</div><div class="step-text">または⋮メニュー →「アプリをインストール」</div></div><div class="step"><div class="step-num">3</div><div class="step-text">ホーム画面にアイコンが追加されます</div></div></div>`;
}
async function fetchInquiries() {
  document.getElementById('main').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const res = await fetch(WORKER + '/inquiries');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    state.inquiries = Array.isArray(json) ? json : (json.data||json.inquiries||[]);
    state.loaded = true;
    document.getElementById('badge-wrap').innerHTML = state.inquiries.length ? `<div class="badge">${state.inquiries.length}</div>` : '';
    document.getElementById('conn-status').textContent = '接続中 ✓';
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="err-box">読み込み失敗: ${esc(e.message)}<br><small>Worker v6がデプロイされているか確認してください</small></div><button class="btn-primary" onclick="fetchInquiries()">再試行</button>`;
  }
}
async function fetchProspects() {
  document.getElementById('main').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const res = await fetch(WORKER + '/prospects');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    state.prospects = Array.isArray(json) ? json : [];
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="err-box">読み込み失敗: ${esc(e.message)}</div><button class="btn-primary" onclick="fetchProspects()">再試行</button>`;
  }
}
async function delItem(key) {
  if (!confirm('この問い合わせを削除しますか？')) return;
  try {
    const res = await fetch(WORKER + '/delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key}) });
    if (res.ok) { state.inquiries = state.inquiries.filter(i => (i.key||i.email||'') !== key); render(); }
    else { alert('削除失敗: HTTP ' + res.status); }
  } catch(e) { alert('エラー: ' + e.message); }
}
async function testConn() {
  const r = document.getElementById('test-result');
  r.innerHTML = '<div style="text-align:center;padding:10px;font-size:13px;color:var(--sub)">テスト中...</div>';
  for (const ep of ['/inquiries', '/stats', '/']) {
    try {
      const res = await fetch(WORKER + ep);
      if (res.status !== 404) { r.innerHTML = `<div class="ok-box">接続OK — ${ep} → HTTP ${res.status}</div>`; return; }
    } catch(e) {}
  }
  r.innerHTML = `<div class="err-box">全エンドポイントが404です。<br>Worker v6をデプロイしてください。</div>`;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/admin-app/sw.js');
}
render();
</script>
</body>
</html>
