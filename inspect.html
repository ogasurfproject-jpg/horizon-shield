<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>施工不良チェック｜HORIZON SHIELD</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040A12;color:#EEF2F5;font-family:'游ゴシック','Yu Gothic',sans-serif;min-height:100vh;line-height:1.8}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;height:60px;display:flex;justify-content:space-between;align-items:center;background:rgba(4,10,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,212,255,.15)}
.nl{display:flex;align-items:center;gap:10px;text-decoration:none}
.nm{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:4px;color:#EEF2F5}.nm span{color:#00D4FF}
.nb{background:#C8960A;color:#040A12;font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 20px;text-decoration:none;letter-spacing:3px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
main{padding:100px 24px 80px;max-width:780px;margin:0 auto}
.eyebrow{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:5px;color:#00FF88;margin-bottom:12px}
h1{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(28px,4vw,52px);line-height:1.2;margin-bottom:16px}
h1 em{font-style:normal;color:#F0C030}
.sub{font-size:15px;color:#A0BACA;line-height:2;margin-bottom:48px}
.card{background:#070F1A;border:1px solid rgba(0,212,255,.15);padding:36px 32px;margin-bottom:20px}
label{font-size:11px;color:#6A8A9A;letter-spacing:2px;display:block;margin-bottom:8px;font-family:'Share Tech Mono',monospace}
input[type=text],input[type=email],select,textarea{width:100%;background:#040A12;border:1px solid rgba(0,212,255,.2);color:#EEF2F5;padding:12px 16px;font-size:14px;font-family:'游ゴシック','Yu Gothic',sans-serif;outline:none;transition:border .2s;margin-bottom:16px}
input[type=text]:focus,input[type=email]:focus,select:focus,textarea:focus{border-color:#00D4FF}
textarea{resize:vertical;min-height:100px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:480px){.fg{grid-template-columns:1fr}}
.upload-zone{border:2px dashed rgba(0,212,255,.2);padding:40px 24px;text-align:center;cursor:pointer;transition:border .2s;margin-bottom:16px}
.upload-zone:hover{border-color:rgba(0,212,255,.5)}
.upload-zone p{color:#6A8A9A;font-size:14px}
.upload-zone p span{color:#00D4FF}
.preview-wrap{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.preview-img{width:100px;height:100px;object-fit:cover;border:1px solid rgba(0,212,255,.2)}
.pdf-thumb{width:100px;height:100px;border:1px solid rgba(0,212,255,.2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;background:#0A1520;font-size:10px;color:#00D4FF;font-family:'Share Tech Mono',monospace;text-align:center;padding:4px;word-break:break-all}
.btn{background:linear-gradient(135deg,#00FF88,#008844);color:#040A12;font-weight:900;font-size:14px;padding:15px 40px;border:none;cursor:pointer;letter-spacing:.06em;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);width:100%;font-family:'Zen Kaku Gothic New',sans-serif;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
#result{display:none;margin-top:24px;border:1px solid rgba(0,212,255,.2);padding:28px;background:rgba(0,212,255,.03)}
.item-card{background:#040A12;border:1px solid rgba(0,212,255,.1);padding:16px 20px;margin-bottom:12px}
.item-level{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;margin-bottom:6px}
.item-title{font-size:15px;font-weight:700;margin-bottom:6px}
.item-desc{font-size:13px;color:#A0BACA;line-height:1.8}
.cta-box{margin-top:20px;background:rgba(200,150,10,.06);border:1px solid rgba(200,150,10,.25);padding:24px;text-align:center}
.cta-box p{font-size:13px;color:#A0BACA;margin-bottom:12px}
.cta-btn{display:inline-block;background:#C8960A;color:#040A12;font-weight:900;font-size:13px;padding:12px 32px;text-decoration:none;letter-spacing:.05em;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
.note-box{margin-top:32px;font-size:12px;color:#6A8A9A;line-height:2;border-top:1px solid rgba(0,212,255,.08);padding-top:20px}
</style>
</head>
<body>
<nav>
  <a href="/" class="nl"><div class="nm">HORIZON <span>SHIELD</span></div></a>
  <a href="/#diagnosis" class="nb">無料診断</a>
</nav>
<main>
  <div class="eyebrow">FREE CHECK // CONSTRUCTION DEFECT</div>
  <h1>施工不良<em>チェック</em></h1>
  <p class="sub">工事箇所の写真と状況を送ってください。AIが施工不良のリスクを判定し、確認すべきポイントをお伝えします。</p>
  <div class="card">
    <div class="fg">
      <div>
        <label>お名前 *</label>
        <input type="text" id="name" placeholder="山田 太郎">
      </div>
      <div>
        <label>メールアドレス *</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>
    </div>
    <label>工事の種類</label>
    <select id="koji-type">
      <option value="">選択してください</option>
      <option value="屋根工事">屋根工事</option>
      <option value="外壁工事">外壁工事</option>
      <option value="床下工事">床下工事</option>
      <option value="内装工事">内装工事</option>
      <option value="水回り工事">水回り工事</option>
      <option value="基礎工事">基礎工事</option>
      <option value="その他">その他</option>
    </select>
    <label>気になる箇所・状況を説明してください</label>
    <textarea id="situation" placeholder="例：外壁塗装後にひびが入っている。工事から3ヶ月しか経っていないのに劣化が気になる。"></textarea>
    <label>写真・PDFをアップロード（任意・複数可）</label>
    <div class="upload-zone" onclick="document.getElementById('photo-input').click()">
      <p><span>📷 ここをタップしてファイルを選択</span></p>
      <p>JPG・PNG・HEIC・PDF対応</p>
      <input id="photo-input" type="file" accept="image/*,.pdf,application/pdf" multiple style="display:none" onchange="previewFiles(this)">
    </div>
    <div class="preview-wrap" id="preview-wrap"></div>
    <button class="btn" id="submit-btn" onclick="checkInspect()">AIで施工不良を診断する →</button>
  </div>
  <div id="result"></div>
  <div class="note-box">
    ※ 本ツールはAIによる一般的なリスクパターンの分析です。現地確認が必要な場合は専門家への依頼をお勧めします。<br>
    ※ 現場立会い検査は<a href="/#services" style="color:#00D4FF">完成検査立会いサービス（¥88,000）</a>をご利用ください。
  </div>
</main>
<script>
var KIRA = 'https://hs-kira-proxy.oga-surf-project.workers.dev';
var fileData = [];

function previewFiles(input) {
  var wrap = document.getElementById('preview-wrap');
  wrap.innerHTML = '';
  fileData = [];
  Array.from(input.files).slice(0, 8).forEach(function(file) {
    var isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result.split(',')[1];
      fileData.push({
        data: b64,
        mediaType: file.type || 'image/jpeg',
        isPdf: isPdf,
        name: file.name
      });
      if (isPdf) {
        var div = document.createElement('div');
        div.className = 'pdf-thumb';
        div.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' + file.name.slice(0, 12);
        wrap.appendChild(div);
      } else {
        var img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview-img';
        wrap.appendChild(img);
      }
    };
    reader.readAsDataURL(file);
  });
}

async function checkInspect() {
  var name = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var koji = document.getElementById('koji-type').value;
  var sit = document.getElementById('situation').value.trim();

  if (!name || !email) { alert('お名前とメールアドレスを入力してください'); return; }
  if (!koji && !sit && !fileData.length) { alert('工事種類・状況・写真のいずれかを入力してください'); return; }

  var btn = document.getElementById('submit-btn');
  btn.textContent = '分析中...';
  btn.disabled = true;
  document.getElementById('result').style.display = 'none';

  // 1. LINE通知（依頼受付）
  try {
    await fetch(KIRA + '/notify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: '【施工チェック依頼】\n名前：' + name + '\nメール：' + email + '\n種類：' + (koji || '未選択') + '\n状況：' + (sit || 'なし') + '\nファイル数：' + fileData.length + '件\n\n⚠️ 要確認',
        name: name,
        email: email,
        type: koji || '',
        result: ''
      })
    });
  } catch(e) {}

  // 2. KIRA診断
  var resultText = '';
  var resultJson = null;
  try {
    var content = fileData.map(function(f) {
      return f.isPdf
        ? {type: 'document', source: {type: 'base64', media_type: 'application/pdf', data: f.data}}
        : {type: 'image', source: {type: 'base64', media_type: f.mediaType || 'image/jpeg', data: f.data}};
    });
    content.push({type: 'text', text: '工事種類：「' + (koji || '不明') + '」\n状況：「' + (sit || 'なし') + '」\n\n施工不良のリスクを分析してJSON形式で返してください。フィールド：summary(全体評価の文字列)、items(配列：{level:"要確認"/"注意"/"問題なし", title:文字列, desc:文字列}、最大4個)、action(文字列：推奨アクション)。JSONのみ返答。'});

    var res = await fetch(KIRA + '/anthropic', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        system: 'あなたは建設施工管理の専門家です。施工不良の可能性を分析します。必ずJSONのみで返答してください。',
        messages: [{role: 'user', content: content}]
      })
    });
    var data = await res.json();
    var text = data.content[0].text.replace(/```json|```/g, '').trim();
    resultJson = JSON.parse(text);
    resultText = resultJson.summary + '\n' + resultJson.action;
  } catch(e) {
    resultText = '分析中にエラーが発生しました。';
  }

  // 3. メール送信
  if (resultJson) {
    try {
      var lcol = {'要確認': '#FF3040', '注意': '#F0C030', '問題なし': '#00FF88'};
      var emailBody = '<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#040A12;color:#EEF2F5;padding:32px">'
        + '<h2 style="color:#00D4FF;font-size:18px;margin-bottom:16px">KIRAの診断結果</h2>'
        + '<p style="font-size:15px;line-height:1.9;margin-bottom:16px;border-left:3px solid #00FF88;padding-left:12px">' + resultJson.summary + '</p>';
      (resultJson.items || []).forEach(function(item) {
        var c = lcol[item.level] || '#00D4FF';
        emailBody += '<div style="background:#070F1A;border:1px solid rgba(0,212,255,.1);padding:14px 18px;margin-bottom:10px">'
          + '<div style="font-size:10px;color:' + c + ';letter-spacing:3px;margin-bottom:4px">' + item.level + '</div>'
          + '<div style="font-size:14px;font-weight:700;margin-bottom:6px">' + item.title + '</div>'
          + '<div style="font-size:13px;color:#A0BACA">' + item.desc + '</div></div>';
      });
      emailBody += '<div style="margin-top:16px;font-size:14px;color:#F0C030;font-weight:700">推奨アクション：</div>'
        + '<div style="font-size:14px;margin-top:8px;line-height:1.9">' + resultJson.action + '</div>'
        + '<hr style="border:none;border-top:1px solid rgba(255,255,255,.1);margin:24px 0">'
        + '<p style="font-size:12px;color:#6A8A9A">詳細診断は <a href="https://shield.the-horizons-innovation.com" style="color:#00D4FF">HORIZON SHIELD</a> へ。<br>大賀 俊勝 / The HORIZ音s株式会社</p></div>';

      await fetch(KIRA + '/send-email', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          to: email,
          subject: 'KIRAからの診断結果 | HORIZON SHIELD',
          body: emailBody
        })
      });
    } catch(e) {}
  }

  // 4. LINE通知（完了・KV保存）
  try {
    await fetch(KIRA + '/notify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: '【施工チェック完了】\n名前：' + name + '\nメール：' + email + '\n種類：' + (koji || '未選択') + '\n\nKIRA診断：' + resultText,
        name: name,
        email: email,
        type: koji || '',
        result: resultText
      })
    });
  } catch(e) {}

  // 結果表示
  if (resultJson) {
    var lcol = {'要確認': '#FF3040', '注意': '#F0C030', '問題なし': '#00FF88'};
    var html = '<div style="font-size:15px;color:#EEF2F5;margin-bottom:20px;line-height:1.9;border-left:3px solid #00FF88;padding-left:16px">' + resultJson.summary + '</div>';
    (resultJson.items || []).forEach(function(item) {
      var c = lcol[item.level] || '#00D4FF';
      html += '<div class="item-card"><div class="item-level" style="color:' + c + '">' + item.level + '</div><div class="item-title">' + item.title + '</div><div class="item-desc">' + item.desc + '</div></div>';
    });
    html += '<div style="margin-top:16px;font-size:14px;color:#F0C030;font-weight:700">推奨アクション：</div><div style="font-size:14px;color:#EEF2F5;margin-top:8px;line-height:1.9">' + resultJson.action + '</div>';
    html += '<div style="margin-top:12px;font-size:13px;color:#6A8A9A">診断結果を ' + email + ' にメールでお送りしました。</div>';
    html += '<div class="cta-box"><p>より詳しい現地確認・是正要求書の作成はお任せください</p><a href="/#services" class="cta-btn">完成検査立会いを依頼する →</a></div>';
    var result = document.getElementById('result');
    result.innerHTML = html;
    result.style.display = 'block';
  } else {
    var result = document.getElementById('result');
    result.innerHTML = '<p style="color:#ff6b6b;font-size:14px">分析中にエラーが発生しました。時間をおいて再度お試しください。</p>';
    result.style.display = 'block';
  }

  btn.textContent = 'AIで施工不良を診断する →';
  btn.disabled = false;
}
</script>
</body>
</html>
