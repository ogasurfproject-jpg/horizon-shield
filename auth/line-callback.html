<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LINE認証中 | HORIZON SHIELD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:linear-gradient(135deg,#0f1729 0%,#111c38 100%);
  color:#fff;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  max-width:440px;width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(212,175,55,.25);
  border-radius:20px;padding:40px 28px;text-align:center;
  backdrop-filter:blur(8px);
}
.logo{
  font-size:10px;letter-spacing:5px;color:#d4af37;font-weight:700;
  margin-bottom:8px;
}
.title{font-size:18px;font-weight:900;margin-bottom:4px;line-height:1.4}
.subtitle{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:32px}

.spinner{
  width:48px;height:48px;margin:0 auto 20px;
  border:3px solid rgba(212,175,55,.2);
  border-top-color:#d4af37;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.status{
  font-size:14px;color:#d4af37;font-weight:700;margin-bottom:8px;
  line-height:1.6;
}
.detail{font-size:12px;color:rgba(255,255,255,.5);line-height:1.7}

.error-icon{font-size:48px;margin-bottom:12px}
.btn-line{
  display:inline-block;margin-top:18px;
  padding:12px 24px;background:#06c755;color:#fff;
  text-decoration:none;border-radius:10px;
  font-weight:700;font-size:14px;
}
.btn-line:hover{opacity:.9}
.btn-retry{
  display:block;margin-top:10px;
  padding:10px;background:transparent;color:#d4af37;
  border:1px solid #d4af37;border-radius:10px;
  font-size:13px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  width:100%;
}

.hidden{display:none}
</style>
</head>
<body>

<div class="card">
  <div class="logo">HORIZON SHIELD</div>
  <div class="title">🛡 認証処理中</div>
  <div class="subtitle">LINE認証の結果を確認しています</div>

  <!-- ローディング状態 -->
  <div id="loadingView">
    <div class="spinner"></div>
    <div class="status" id="statusText">認証情報を確認中...</div>
    <div class="detail">このまましばらくお待ちください<br>自動的にPayPay決済画面へ遷移します</div>
  </div>

  <!-- エラー状態 -->
  <div id="errorView" class="hidden">
    <div class="error-icon">⚠️</div>
    <div class="status" id="errorTitle">認証エラー</div>
    <div class="detail" id="errorDetail">
      認証処理に失敗しました。<br>
      お手数ですがもう一度お試しください。
    </div>
    <a href="https://line.me/R/ti/p/@172piime" target="_blank" rel="noopener" class="btn-line">
      💬 LINEで直接問い合わせる
    </a>
    <button type="button" class="btn-retry" onclick="location.href='https://shield.the-horizons-innovation.com'">
      トップに戻ってやり直す
    </button>
  </div>
</div>

<script>
const COMPLETE_URL = 'https://hs-kira-proxy.oga-surf-project.workers.dev/checkout/complete';

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');
  const errorDesc = params.get('error_description');

  // ユーザーがLINE認証をキャンセルした場合
  if (error) {
    showError(
      'LINE認証がキャンセルされました',
      (errorDesc || '認証が中断されました') + '<br>もう一度お試しいただくか、LINEで直接ご連絡ください。'
    );
    return;
  }

  // 必須パラメータ不足
  if (!code || !state) {
    showError(
      '認証情報が不足しています',
      'URLに必要なパラメータが含まれていません。最初からやり直してください。'
    );
    return;
  }

  try {
    updateStatus('PayPay決済URLを生成中...');

    const res = await fetch(COMPLETE_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ code, state }),
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text.slice(0, 200)}`);
    }

    const data = await res.json();

    // 正常系：PayPay 決済URLへリダイレクト
    if (data.checkout_url || data.payment_url) {
      updateStatus('✅ 認証成功。PayPay決済画面へ...');
      setTimeout(() => {
        window.location.href = data.checkout_url || data.payment_url;
      }, 800);
      return;
    }

    // PayPay未切替期間等、checkout_urlが取れない場合の銀行振込フォールバック
    if (data.bank_transfer || data.fallback === 'bank_transfer') {
      updateStatus('✅ 認証成功。お支払い方法をご案内します...');
      setTimeout(() => {
        window.location.href = '/thankyou.html?mode=bank_transfer&order=' + (data.order_id || '');
      }, 800);
      return;
    }

    throw new Error('決済URLの取得に失敗しました');

  } catch (err) {
    console.error('Callback error:', err);
    showError(
      '決済画面への接続に失敗しました',
      '一時的なエラーの可能性があります。<br>LINEで直接ご注文いただければ、銀行振込にてご対応いたします。'
    );
  }
}

function updateStatus(text) {
  document.getElementById('statusText').textContent = text;
}

function showError(title, detail) {
  document.getElementById('loadingView').classList.add('hidden');
  document.getElementById('errorView').classList.remove('hidden');
  document.getElementById('errorTitle').textContent = title;
  document.getElementById('errorDetail').innerHTML = detail;
}

// 開始
handleCallback();
</script>

</body>
</html>
