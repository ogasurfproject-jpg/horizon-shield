<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0f1e4a">
<title>HS管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f5f0;--surface:#fff;--s2:#f0ede6;--accent:#0f1e4a;--gold:#c8a832;--text:#1a1a2a;--muted:#888880;--border:#dddad0;--green:#2e7d32;--red:#8b1a1a}
body{font-family:sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--accent);padding:16px;border-bottom:2px solid var(--gold);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20}
.hdr-t{font-size:18px;font-weight:900;letter-spacing:2px;color:#fff}.hdr-t span{color:var(--gold)}
.badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px}
.nav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:2px solid var(--border)}
.ni{padding:10px 4px;text-align:center;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px}
.ni.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{flex:1;padding:16px;overflow-y:auto}
.card{background:var(--surface);border-radius:4px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.btn{width:100%;padding:14px;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px}
.bp{background:var(--accent);color:#fff}.bs{background:var(--surface);color:var(--text);border:1px solid var(--border)}.bd{background:transparent;color:var(--red);border:1px solid rgba(139,26,26,.3)}
.empty{text-align:center;padding:40px;color:var(--muted)}
.info{background:var(--s2);border-radius:4px;padding:14px;font-size:13px;color:var(--muted);margin-bottom:12px;border:1px solid var(--border)}
.err{background:rgba(139,26,26,.06);color:var(--red);border:1px solid rgba(139,26,26,.2);border-radius:4px;padding:14px;font-size:13px;margin-bottom:12px}
.ok{background:rgba(46,125,50,.06);color:var(--green);border:1px solid rgba(46,125,50,.2);border-radius:4px;padding:14px;font-size:13px;margin-bottom:12px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-t">HORIZON<span>SHIELD</span></div>
  <div id="bw"></div>
</div>
<div class="nav">
  <div class="ni active" onclick="go('i',this)">📥 問い合わせ</div>
  <div class="ni" onclick="go('d',this)">📊 状況</div>
  <div class="ni" onclick="go('p',this)">⭐ 見込み</div>
  <div class="ni" onclick="go('s',this)">⚙ 設定</div>
</div>
<main class="main" id="main"></main>
<script>
var W='https://hs-kira-proxy.oga-surf-project.workers.dev';
var st={tab:'i',inq:[],pros:[],loaded:false};
function go(t,el){st.tab=t;document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});el.classList.add('active');render();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function td(i){var el=document.getElementById('d'+i);if(!el)return;el.style.display=el.style.display==='none'?'block':'none';}
function render(){
  var m=document.getElementById('main');
  if(st.tab==='i'){
    if(!st.loaded){m.innerHTML='<div class="info">ボタンを押して問い合わせを取得します。</div><button class="btn bp" onclick="fi()">問い合わせを読み込む</button>';return;}
    if(!st.inq.length){m.innerHTML='<button class="btn bs" onclick="fi()">再読み込み</button><div class="empty">問い合わせはまだありません</div>';return;}
    var h='<button class="btn bs" onclick="fi()">再読み込み</button>';
    for(var i=0;i<st.inq.length;i++){
      var it=st.inq[i];
      var raw=it.result||it.message||'';
      var rows=[];
      try{var a=JSON.parse(raw);if(Array.isArray(a))rows=a;else if(a)rows=[String(a)];}catch(e){if(raw)rows=[raw];}
      var prev=rows.length?esc(String(rows[0])).slice(0,60)+(String(rows[0]).length>60?'…':''):'—';
      var rk=it.risk==='high'?'<span style="color:var(--red);font-weight:700">🔴 高リスク</span>':it.risk==='medium'?'<span style="color:var(--gold);font-weight:700">🟡 中リスク</span>':it.risk==='low'?'<span style="color:var(--green);font-weight:700">🟢 低リスク</span>':'';
      var dr='';for(var j=0;j<rows.length;j++){dr+='<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">▶ '+esc(String(rows[j]))+'</div>';}
      var em=esc(it.email||'');var ky=esc(it.key||it.email||'');
      h+='<div class="card">'
        +'<div style="padding:14px 16px;background:var(--s2);display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="td('+i+')">'
        +'<div><div style="font-size:15px;font-weight:700">'+esc(it.name||'名前なし')+'</div><div style="font-size:12px;color:var(--muted)">'+em+'</div></div>'
        +'<div>'+rk+'</div></div>'
        +'<div style="padding:10px 16px;font-size:13px;color:var(--muted)">'+prev+'</div>'
        +'<div id="d'+i+'" style="display:none;padding:14px 16px;border-top:1px solid var(--border);background:var(--s2)">'
        +'<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">診断詳細</div>'
        +dr
        +'<div style="margin-top:12px;font-size:13px;line-height:2">'
        +'<div>メール：<a href="mailto:'+em+'" style="color:var(--accent)">'+em+'</a></div>'
        +'<div>日時：'+esc(it.createdAt||it.date||'—')+'</div></div>'
        +'<div style="margin-top:12px;display:flex;gap:8px">'
        +'<a href="mailto:'+em+'?subject=【HORIZON SHIELD】診断結果について" style="flex:1;display:block;text-align:center;padding:11px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;text-decoration:none;border-radius:3px">メール返信</a>'
        +'<button onclick="di(\''+ky+'\');event.stopPropagation()" style="padding:11px 14px;background:transparent;border:1px solid rgba(139,26,26,.3);color:var(--red);font-size:13px;font-weight:700;cursor:pointer;border-radius:3px">

<script>

var st={tab:'i',inq:[],pros:[],loaded:false};

  var m=document.getElementById('main');
  if(st.tab==='i'){
    if(!st.loaded){m.innerHTML='<div class="info">ボタンを押して問い合わせを取得します。</div><button class="btn bp" onclick="fi()">問い合わせを読み込む</button>';return;}

      var dr='';for(var j=0;j<rows.length;j++){dr+='<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">▶ '+esc(String(rows[j]))+'</div>';}
      var em=esc(it.email||'');var ky=esc(it.key||it.email||'');

        +'<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">診断詳細</div>'

async function fi(){
  document.getElementById('main').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">読み込み中...</div>';
  try{
    var r=await fetch(W+'/inquiries');
    if(!r.ok)throw new Error('HTTP '+r.status);
    var j=await r.json();
    st.inq=Array.isArray(j)?j:(j.data||j.inquiries||[]);
    st.loaded=true;
    document.getElementById('bw').innerHTML=st.inq.length?'<div class="badge">'+st.inq.length+'</div>':'';
    render();
  }catch(e){document.getElementById('main').innerHTML='<div class="err">失敗: '+esc(e.message)+'</div><button class="btn bp" onclick="fi()">再試行</button>';}
}
async function fp(){
  document.getElementById('main').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">読み込み中...</div>';
  try{var r=await fetch(W+'/prospects');var j=await r.json();st.pros=Array.isArray(j)?j:[];render();}
  catch(e){document.getElementById('main').innerHTML='<div class="err">失敗: '+esc(e.message)+'</div>';}
}
async function di(key){
  if(!confirm('削除しますか？'))return;
  try{
    var r=await fetch(W+'/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:key})});
    if(r.ok){st.inq=st.inq.filter(function(i){return(i.key||i.email||'')!==key;});document.getElementById('bw').innerHTML=st.inq.length?'<div class="badge">'+st.inq.length+'</div>':'';render();}
    else alert('削除失敗');
  }catch(e){alert('エラー: '+e.message);}
}
async function ca(){
  if(!confirm('全件削除します。よろしいですか？'))return;
  try{var r=await fetch(W+'/clear',{method:'POST'});if(r.ok){st.inq=[];st.loaded=false;document.getElementById('bw').innerHTML='';render();}else alert('失敗');}
  catch(e){alert('エラー');}
}
async function tc(){
  var r=document.getElementById('tr');r.innerHTML='テスト中...';
  try{var res=await fetch(W+'/inquiries');r.innerHTML='<div class="ok">接続OK → HTTP '+res.status+'</div>';}
  catch(e){r.innerHTML='<div class="err">接続失敗</div>';}
}
