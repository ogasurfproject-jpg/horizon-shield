<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORIZON SHIELD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:#FAF8F4;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* 障子紙テクスチャ */
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(90deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 3px,rgba(0,0,0,.012) 3px,rgba(0,0,0,.012) 4px),
    repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 11px,rgba(0,0,0,.008) 11px,rgba(0,0,0,.008) 12px);
  pointer-events:none;
}

.wrap{
  display:flex;flex-direction:column;align-items:center;
  gap:2.4rem;position:relative;z-index:1;
  animation:wrap-in 0.8s ease forwards;
  opacity:0;
}
@keyframes wrap-in{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}

/* ── KIRAアイコン ── */
.orb-wrap{position:relative;width:180px;height:180px;}

/* ── テキスト ── */
.brand{
  font-family:'Instrument Serif',serif;
  font-size:1.5rem;letter-spacing:.18em;
  color:#1A3A54;text-align:center;
}
.tagline{
  font-size:.72rem;color:#8A7868;
  letter-spacing:.18em;margin-top:.3rem;
  font-weight:300;text-align:center;
}

/* ── プログレスバー ── */
.progress-wrap{width:160px;height:1.5px;background:rgba(28,21,16,.1);border-radius:1px;overflow:hidden;}
.progress-bar{
  height:100%;background:linear-gradient(90deg,#C24E1A,#A97820);
  width:0%;border-radius:1px;
  animation:progress 2.8s cubic-bezier(.4,0,.2,1) forwards;
  animation-delay:0.3s;
}
@keyframes progress{
  0%{width:0%}
  100%{width:100%}
}

/* ── フェードアウト ── */
.fade-out{animation:fade-out 0.6s ease forwards;}
@keyframes fade-out{
  from{opacity:1}
  to{opacity:0;pointer-events:none}
}
</style>
</head>
<body>
<div class="wrap" id="wrap">

  <!-- KIRAアイコン -->
  <div class="orb-wrap">
    <svg width="180" height="180" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
      <defs>
        <radialGradient id="op-orb" cx="38%" cy="32%" r="60%">
          <stop offset="0%" stop-color="#FFE060"/>
          <stop offset="22%" stop-color="#F5A800"/>
          <stop offset="50%" stop-color="#C87000"/>
          <stop offset="80%" stop-color="#7A3C00"/>
          <stop offset="100%" stop-color="#3E1A00"/>
        </radialGradient>
        <radialGradient id="op-glw" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(220,140,0,0.22)"/>
          <stop offset="100%" stop-color="rgba(200,110,0,0)"/>
        </radialGradient>
        <filter id="op-gf" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="10"/>
        </filter>
        <filter id="op-rf"><feGaussianBlur stdDeviation="0.5"/></filter>
        <filter id="op-ray"><feGaussianBlur stdDeviation="0.6"/></filter>
      </defs>

      <!-- ambient glow -->
      <ellipse cx="100" cy="118" rx="82" ry="20" fill="rgba(180,110,0,0.07)" filter="url(#op-gf)">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="17;24;17" dur="4s" repeatCount="indefinite"/>
      </ellipse>

      <!-- orbital rings -->
      <g filter="url(#op-rf)">
        <ellipse cx="100" cy="110" rx="86" ry="20" fill="none" stroke="rgba(160,100,0,0.12)" stroke-width="0.8" stroke-dasharray="9 13">
          <animate attributeName="stroke-dashoffset" from="0" to="-548" dur="32s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="100" cy="108" rx="70" ry="16" fill="none" stroke="rgba(160,100,0,0.20)" stroke-width="0.9" stroke-dasharray="9 12">
          <animate attributeName="stroke-dashoffset" from="0" to="440" dur="24s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;1;0.7" dur="4.5s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="100" cy="107" rx="55" ry="13" fill="none" stroke="rgba(160,100,0,0.29)" stroke-width="1" stroke-dasharray="7 9">
          <animate attributeName="stroke-dashoffset" from="0" to="-348" dur="17s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="100" cy="106" rx="41" ry="10" fill="none" stroke="rgba(160,100,0,0.40)" stroke-width="1.1" stroke-dasharray="6 8">
          <animate attributeName="stroke-dashoffset" from="0" to="260" dur="12s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.75;1;0.75" dur="3.5s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="100" cy="105" rx="28" ry="7" fill="none" stroke="rgba(160,100,0,0.52)" stroke-width="1.3" stroke-dasharray="5 7">
          <animate attributeName="stroke-dashoffset" from="0" to="-178" dur="8.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
        </ellipse>
      </g>

      <!-- equator line -->
      <line x1="4" y1="106" x2="196" y2="106" stroke="rgba(160,100,0,0.20)" stroke-width="0.6">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
      </line>

      <!-- light rays -->
      <g filter="url(#op-ray)">
        <line x1="100" y1="58" x2="100" y2="34" stroke="rgba(160,90,0,0.82)" stroke-width="1.3">
          <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
          <animate attributeName="y2" values="34;30;34" dur="2.4s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="81" y2="39" stroke="rgba(160,90,0,0.62)" stroke-width="1">
          <animate attributeName="opacity" values="0.4;0.88;0.4" dur="2.7s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="119" y2="39" stroke="rgba(160,90,0,0.62)" stroke-width="1">
          <animate attributeName="opacity" values="0.4;0.88;0.4" dur="2.7s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="64" y2="47" stroke="rgba(160,90,0,0.44)" stroke-width="0.8">
          <animate attributeName="opacity" values="0.3;0.70;0.3" dur="3.1s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="136" y2="47" stroke="rgba(160,90,0,0.44)" stroke-width="0.8">
          <animate attributeName="opacity" values="0.3;0.70;0.3" dur="3.1s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="50" y2="56" stroke="rgba(160,90,0,0.27)" stroke-width="0.6">
          <animate attributeName="opacity" values="0.2;0.52;0.2" dur="3.6s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="150" y2="56" stroke="rgba(160,90,0,0.27)" stroke-width="0.6">
          <animate attributeName="opacity" values="0.2;0.52;0.2" dur="3.6s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="38" y2="65" stroke="rgba(160,90,0,0.16)" stroke-width="0.5">
          <animate attributeName="opacity" values="0.1;0.32;0.1" dur="4.2s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="58" x2="162" y2="65" stroke="rgba(160,90,0,0.16)" stroke-width="0.5">
          <animate attributeName="opacity" values="0.1;0.32;0.1" dur="4.2s" repeatCount="indefinite"/>
        </line>
      </g>

      <!-- sphere glow -->
      <circle cx="100" cy="62" r="42" fill="url(#op-glw)">
        <animate attributeName="r" values="38;48;38" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
      </circle>

      <!-- sphere body -->
      <circle cx="100" cy="62" r="26" fill="url(#op-orb)">
        <animate attributeName="r" values="23;27;23" dur="4s" repeatCount="indefinite"/>
      </circle>

      <!-- highlight -->
      <ellipse cx="91" cy="54" rx="9" ry="5.5" fill="rgba(255,255,200,0.44)">
        <animate attributeName="opacity" values="0.35;0.60;0.35" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="88" cy="52" rx="3.5" ry="2" fill="rgba(255,255,240,0.65)">
        <animate attributeName="opacity" values="0.5;0.85;0.5" dur="4s" repeatCount="indefinite"/>
      </ellipse>
    </svg>
  </div>

  <!-- ブランド -->
  <div>
    <div class="brand">HORIZON SHIELD</div>
    <div class="tagline">AI × 大工30年 ｜ 施主を守る</div>
  </div>

  <!-- プログレス -->
  <div class="progress-wrap">
    <div class="progress-bar" id="pbar"></div>
  </div>
</div>

<script>
/* アニメーション完了後にLPへリダイレクト */
setTimeout(function(){
  var w = document.getElementById('wrap');
  if(w) w.classList.add('fade-out');
  setTimeout(function(){
    /* index.htmlにsessionStorageをセットしてリダイレクト */
    /* opening.htmlから来た場合はhs_seenをセット済みにする */
    sessionStorage.setItem('hs_seen','1');
    location.href = '/';
  }, 600);
}, 3200);
</script>
</body>
</html>
