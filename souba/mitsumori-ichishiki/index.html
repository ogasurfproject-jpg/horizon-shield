<h1>見積書に「一式」が多い。これって大丈夫？</h1>
<p><strong>結論：3箇所以上は要注意。内訳開示を要求してください。</strong></p>
<ul>
<li>正当な業者→材料名・メーカー・型番・数量・単価を明記</li>
<li>「一式」だけ→内訳を隠している可能性</li>
<li>諸経費→適正は総工事費の5〜10%。15%超は水増しの疑い</li>
</ul>
